<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语言寻根 · Language Roots</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1610'/%3E%3Cg fill='none' stroke='%23C6A15B' stroke-width='1.6' stroke-linecap='round'%3E%3Cpath d='M16 25V11'/%3E%3Cpath d='M16 18c0-3 2-5 6-5'/%3E%3Cpath d='M16 15c0-3-2-5-6-5'/%3E%3Cpath d='M16 11V7'/%3E%3Cpath d='M16 25c-2 0-4-1-5-3'/%3E%3Cpath d='M16 25c2 0 4-1 5-3'/%3E%3C/g%3E%3C/svg%3E" />

  <!-- 人文字体：思源宋体（标题·厚重）+ 思源黑体（正文·温润） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (本地化) -->
  <script src="vendor/tailwind.js"></script>
  <!-- Lucide Icons (本地化) -->
  <script src="vendor/lucide.min.js"></script>
  <!-- Vis.js Network (本地化) -->
  <script type="text/javascript" src="vendor/vis-network.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          // 暖墨底色 + 赭金/鼠尾草绿的克制主色（复古人文调）
          colors: { base: '#17140F', brand: '#C6A15B', emerald: '#8A9A6B' },
          fontFamily: {
            sans: ['"Noto Sans SC"', 'Inter', 'system-ui', '-apple-system', 'sans-serif'],
            serif: ['"Noto Serif SC"', 'Georgia', '"Songti SC"', 'serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="font-sans antialiased">

  <div id="aurora"></div>
  <div id="duskVeil"></div>
  <div id="starfield"></div>
  <div id="graph"></div>

  <!-- 顶部浮动工具栏 -->
  <div class="fixed top-5 left-5 z-40 flex flex-col gap-3 w-[min(92vw,380px)] top-toolbar">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:rgba(198,161,91,0.12);border:1px solid rgba(198,161,91,0.32)">
        <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="#C6A15B" stroke-width="1.6" stroke-linecap="round"><path d="M12 21V8"/><path d="M12 14c0-3 2-5 6-5"/><path d="M12 11c0-3-2-5-6-5"/><path d="M12 8V4"/><path d="M12 21c-2 0-4-1-5-3"/><path d="M12 21c2 0 4-1 5-3"/></svg>
      </div>
      <div>
        <p class="font-serif font-semibold text-[18px] tracking-wide leading-none tt-title" style="color:#ECE3D4">语言寻根</p>
        <p class="text-[11px] mt-1.5 tracking-wide tt-sub" style="color:#8A7F6A">每一种语言，都是一个族群凝望世界的方式 · 收录 68 种</p>
      </div>
    </div>

    <div id="searchArea" class="relative">
      <div id="searchShell" class="flex items-center gap-2.5 rounded-2xl px-4 py-3">
        <i data-lucide="search" class="w-[18px] h-[18px] shrink-0" style="color:#5C5345"></i>
        <input id="searchInput" type="text" autocomplete="off" class="tt-input"
          placeholder="寻一种语言……"
          class="flex-1 bg-transparent outline-none text-[15px] tracking-wide" style="color:#ECE3D4" />
        <button id="searchBtn" class="shrink-0 active:scale-90 transition-all flex items-center" style="color:#6B6152">
          <i data-lucide="corner-down-left" class="w-4 h-4"></i>
        </button>
      </div>
      <!-- 实时预测下拉 -->
      <div id="searchSuggest" class="absolute left-0 right-0"></div>
    </div>

    <!-- 浏览模式切换 -->
    <div id="modeSwitch" class="flex items-center gap-1 p-1 rounded-2xl">
      <button data-mode="all" class="mode-btn font-serif">全部</button>
      <button data-mode="common" class="mode-btn font-serif">常用</button>
      <button data-mode="endangered" class="mode-btn font-serif">濒危 · 守护</button>
    </div>

    <!-- 视图模式切换 + 筛选入口 -->
    <div id="viewBar" class="flex items-center gap-2">
      <div id="viewSwitch" class="flex items-center gap-1 p-1 rounded-2xl flex-1">
        <button data-view="graph" class="mode-btn font-serif">关系图谱</button>
        <button data-view="map" class="mode-btn font-serif">世界地图</button>
        <button data-view="tree" class="mode-btn font-serif">谱系树</button>
      </div>
      <button id="filterBtn" class="filter-btn flex items-center gap-1.5" title="按属性筛选">
        <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>筛选
        <span id="filterCount" class="filter-count" hidden>0</span>
      </button>
    </div>

    <!-- 着色方式切换 -->
    <div id="colorBar" class="flex items-center gap-2">
      <div id="colorSwitch" class="flex items-center gap-1 p-1 rounded-2xl flex-1">
        <button data-color="family" class="mode-btn font-serif">按语系</button>
        <button data-color="endanger" class="mode-btn font-serif">按濒危</button>
      </div>
      <button id="themeBtn" class="filter-btn flex items-center gap-1.5" title="切换深浅色">
        <i data-lucide="moon" class="w-4 h-4"></i>
      </button>
    </div>

    <div id="quickTags" class="flex flex-wrap items-center gap-2 text-sm"></div>
  </div>

  <!-- 世界地图视图（与关系图谱互斥切换，淡入淡出） -->
  <div id="mapView">
    <svg id="mapSvg" class="map-svg" viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- 谱系树视图（第三种视图：一图看清亲缘，淡入淡出） -->
  <div id="treeView">
    <svg id="treeSvg" class="tree-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- 属性筛选侧栏 -->
  <aside id="filterPanel">
    <div class="fp-head">
      <span>按属性筛选</span>
      <div class="flex items-center gap-2">
        <button id="filterClear" class="fp-clear">清除</button>
        <button id="filterClose" class="fp-close"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
    </div>
    <div id="filterBody" class="fp-body"></div>
  </aside>

  <!-- 操作提示 -->
  <div class="fixed bottom-5 left-5 z-20 px-3 py-2 text-[11px] flex items-center gap-4 tracking-wide bottom-hint" style="color:#7E7460">
    <span class="flex items-center gap-1.5"><i data-lucide="mouse-pointer-click" class="w-3 h-3"></i> 单击选中 · 高亮归属并保持</span>
    <span class="hidden sm:flex items-center gap-1.5"><i data-lucide="move" class="w-3 h-3"></i> 可自由拖拽 · 双击取消</span>
  </div>

  <!-- 视图控制 + 纯享视图开关 -->
  <div id="viewCtrls" class="fixed bottom-5 right-5 z-30 flex flex-col gap-1.5" style="color:#7E7460">
    <button id="focusBtn" class="w-9 h-9 rounded-lg flex items-center justify-center hover:text-[#ECE3D4] hover:bg-white/5 transition-colors" title="纯享视图（隐藏界面，按 Esc 退出）" aria-pressed="false"><i data-lucide="eye" class="w-[18px] h-[18px]"></i></button>
    <button id="zoomIn" class="w-9 h-9 rounded-lg flex items-center justify-center hover:text-[#ECE3D4] hover:bg-white/5 transition-colors"><i data-lucide="plus" class="w-[18px] h-[18px]"></i></button>
    <button id="zoomOut" class="w-9 h-9 rounded-lg flex items-center justify-center hover:text-[#ECE3D4] hover:bg-white/5 transition-colors"><i data-lucide="minus" class="w-[18px] h-[18px]"></i></button>
    <button id="fitBtn" class="w-9 h-9 rounded-lg flex items-center justify-center hover:text-[#ECE3D4] hover:bg-white/5 transition-colors" title="回到全局视图"><i data-lucide="maximize" class="w-[18px] h-[18px]"></i></button>
  </div>

  <!-- 图例 -->
  <div id="legend" class="fixed top-5 right-5 z-20 hidden lg:flex items-center gap-x-3 gap-y-1 flex-wrap max-w-[520px] justify-end text-[11px] tracking-wide" style="color:#8A7F6A">
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#7E8FB0]"></span>印欧</span>
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#C6A15B]"></span>汉藏</span>
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#8A9A6B]"></span>乌拉尔/非洲</span>
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#C0785B]"></span>美洲</span>
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#6E9E9A]"></span>南岛</span>
    <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#B07C9E]"></span>孤立</span>
  </div>

  <!-- 右侧详情抽屉 -->
  <aside id="drawer">
    <div class="h-full flex flex-col relative">
      <!-- 关闭按钮：放在淡入淡出容器之外，切换内容时始终稳定可点 -->
      <button id="shareBtn" class="absolute top-5 right-16 z-10 w-9 h-9 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors" title="复制分享链接">
        <i data-lucide="share-2" class="w-5 h-5"></i>
      </button>
      <button id="closeDrawer" class="absolute top-5 right-5 z-10 w-9 h-9 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
      <!-- d-inner：内容切换时对它做 opacity 淡入淡出 -->
      <div id="d-inner" class="h-full flex flex-col" style="transition: opacity .22s ease;">
        <div class="relative px-7 pt-8 pb-5 shrink-0">
          <p id="d-eyebrow" class="font-serif text-[11px] tracking-[0.24em] mb-2" style="color:#9A8F79">Language Profile</p>
          <h2 id="d-name" class="font-serif text-[26px] font-semibold pr-10 leading-snug" style="color:#F1E9DA"></h2>
          <div id="d-lineage" class="mt-3 flex flex-wrap items-center gap-x-1.5 gap-y-1 text-xs"></div>
        </div>
        <div id="d-body" class="flex-1 overflow-y-auto px-5 pb-8 space-y-3"></div>
      </div>
    </div>
  </aside>

  <div id="scrim" class="fixed inset-0 z-20 bg-black/0 hidden"></div>

  <!-- 悬浮操作簇：抽卡 / 语言架 / 人格测试 -->
  <div id="fabStack">
    <button id="drawFab" title="抽一张语言卡">
      <i data-lucide="dices" class="w-[18px] h-[18px]"></i>
      <span>语言抽卡</span>
    </button>
    <button id="shelfFab" title="我的语言架">
      <i data-lucide="library" class="w-[18px] h-[18px]"></i>
      <span>我的语言架</span>
      <span id="shelfBadge" class="fab-badge" hidden>0</span>
    </button>
    <button id="quizFab" title="测测你的语言人格">
      <i data-lucide="feather" class="w-[18px] h-[18px]"></i>
      <span>语言人格测试</span>
    </button>
  </div>
  <div id="drawOverlay" class="draw-overlay hidden"><div class="draw-card"></div></div>
  <div id="shelfOverlay" class="shelf-overlay hidden"><div class="shelf-card"></div></div>
  <div id="quizOverlay" class="quiz-overlay hidden"><div class="quiz-card"></div></div>

  <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-40 glass rounded-xl px-4 py-2.5 text-sm text-slate-200 opacity-0 pointer-events-none flex items-center gap-2 max-w-[90vw]">
    <i data-lucide="telescope" class="w-4 h-4 text-brand shrink-0"></i>
    <span id="toastText"></span>
  </div>

  <!-- =====================================================================
       JavaScript
  ====================================================================== -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
